<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TrackMove GPS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg: #080c10;
    --surface: #0f1419;
    --surface2: #171e26;
    --border: rgba(255,255,255,0.06);
    --text: #e8edf2;
    --muted: #5a6578;
    --walk: #00d9a3;
    --jog: #ff6b35;
    --bike: #3d9eff;
    --accent: var(--walk);
    --glow-color: rgba(0,217,163,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated bg grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,217,163,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,217,163,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    transition: background-image 0.5s;
  }

  body.mode-jog::before {
    background-image:
      linear-gradient(rgba(255,107,53,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,53,0.03) 1px, transparent 1px);
  }

  body.mode-bike::before {
    background-image:
      linear-gradient(rgba(61,158,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,158,255,0.03) 1px, transparent 1px);
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 500px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    animation: slideDown 0.5s ease both;
  }

  .logo-block .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    background: linear-gradient(120deg, var(--walk), #00b4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .logo-block .sub {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .gps-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .gps-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .gps-dot.locked {
    background: var(--walk);
    box-shadow: 0 0 8px var(--walk);
    animation: gpsPulse 2s ease infinite;
  }

  @keyframes gpsPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.5); opacity: 0.6; }
  }

  /* ── Mode Tabs ── */
  .mode-tabs {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 8px;
    margin-bottom: 20px;
    animation: slideUp 0.5s 0.1s ease both;
  }

  .tab {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .tab::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 2px;
    transform: scaleX(0);
    transition: transform 0.3s ease;
  }

  .tab.walk::after  { background: var(--walk); }
  .tab.jog::after   { background: var(--jog); }
  .tab.bike::after  { background: var(--bike); }

  .tab.active::after { transform: scaleX(1); }
  .tab.active.walk  { border-color: rgba(0,217,163,0.35); background: rgba(0,217,163,0.05); }
  .tab.active.jog   { border-color: rgba(255,107,53,0.35); background: rgba(255,107,53,0.05); }
  .tab.active.bike  { border-color: rgba(61,158,255,0.35); background: rgba(61,158,255,0.05); }

  .tab-icon { font-size: 24px; display: block; margin-bottom: 5px; }
  .tab-name {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.2s;
    display: block;
  }

  .tab.active.walk .tab-name { color: var(--walk); }
  .tab.active.jog  .tab-name { color: var(--jog); }
  .tab.active.bike .tab-name { color: var(--bike); }

  /* ── Map ── */
  .map-wrapper {
    border-radius: 20px;
    overflow: hidden;
    border: 1.5px solid var(--border);
    margin-bottom: 16px;
    height: 220px;
    position: relative;
    animation: slideUp 0.5s 0.15s ease both;
  }

  #map { width: 100%; height: 100%; }

  .map-overlay {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(8,12,16,0.85);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 10px;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    backdrop-filter: blur(8px);
    z-index: 999;
  }

  .map-overlay span {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    font-size: 11px;
  }

  /* ── Big KM Display ── */
  .km-hero {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px 24px;
    margin-bottom: 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: slideUp 0.5s 0.2s ease both;
  }

  .km-hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.4s;
  }

  .km-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .km-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 96px;
    line-height: 0.9;
    color: var(--walk);
    letter-spacing: -2px;
    transition: color 0.4s;
    position: relative;
  }

  body.mode-jog  .km-number { color: var(--jog); }
  body.mode-bike .km-number { color: var(--bike); }

  .km-unit {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 500;
  }

  /* ── Stats Row ── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
    animation: slideUp 0.5s 0.25s ease both;
  }

  .stat-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .stat-box-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .stat-box-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }

  .stat-box-unit {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    margin-top: 2px;
  }

  /* Timer has indicator */
  .timer-box {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .live-dot.on {
    background: var(--walk);
    box-shadow: 0 0 10px var(--walk);
    animation: gpsPulse 1.2s ease infinite;
  }

  body.mode-jog  .live-dot.on { background: var(--jog); box-shadow: 0 0 10px var(--jog); }
  body.mode-bike .live-dot.on { background: var(--bike); box-shadow: 0 0 10px var(--bike); }

  /* ── Controls ── */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
    animation: slideUp 0.5s 0.3s ease both;
  }

  .btn {
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

  .btn-start {
    grid-column: 1 / -1;
    padding: 20px;
    font-size: 14px;
    letter-spacing: 2px;
    background: var(--walk);
    color: #000;
    font-weight: 700;
    box-shadow: 0 6px 28px rgba(0,217,163,0.3);
  }

  .btn-start:hover:not(:disabled) { box-shadow: 0 10px 36px rgba(0,217,163,0.45); transform: translateY(-1px); }
  
  body.mode-jog  .btn-start { background: var(--jog);  box-shadow: 0 6px 28px rgba(255,107,53,0.3); }
  body.mode-jog  .btn-start:hover:not(:disabled) { box-shadow: 0 10px 36px rgba(255,107,53,0.45); }
  body.mode-bike .btn-start { background: var(--bike); box-shadow: 0 6px 28px rgba(61,158,255,0.3); }
  body.mode-bike .btn-start:hover:not(:disabled) { box-shadow: 0 10px 36px rgba(61,158,255,0.45); }

  .btn-pause {
    background: rgba(255,255,255,0.05);
    color: var(--text);
    border: 1.5px solid var(--border);
  }

  .btn-pause:hover:not(:disabled) { background: rgba(255,255,255,0.09); }

  .btn-stop {
    background: rgba(255,70,70,0.1);
    color: #ff5555;
    border: 1.5px solid rgba(255,70,70,0.15);
  }

  .btn-stop:hover:not(:disabled) { background: rgba(255,70,70,0.18); }

  /* ── Status ── */
  .status-msg {
    text-align: center;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 14px;
    animation: slideUp 0.5s 0.32s ease both;
    min-height: 18px;
  }

  .status-msg .hi { color: var(--walk); font-weight: 600; }
  body.mode-jog  .status-msg .hi { color: var(--jog); }
  body.mode-bike .status-msg .hi { color: var(--bike); }

  /* ── Log ── */
  .log-panel {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 18px 20px;
    animation: slideUp 0.5s 0.35s ease both;
  }

  .log-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .log-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .btn-clear {
    background: none;
    border: none;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: color 0.2s;
  }

  .btn-clear:hover { color: #ff5555; }

  .log-empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 18px 0;
    opacity: 0.5;
  }

  .log-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    animation: slideUp 0.25s ease both;
  }

  .log-row:last-child { border-bottom: none; }

  .log-ico {
    font-size: 18px;
    width: 38px; height: 38px;
    background: var(--surface2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .log-info { flex: 1; min-width: 0; }

  .log-km-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
  }

  .log-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .log-dur {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* ── GPS error toast ── */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a0f0f;
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff7070;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 12px;
    letter-spacing: 0.5px;
    z-index: 9999;
    transition: transform 0.3s ease;
    max-width: 340px;
    text-align: center;
    backdrop-filter: blur(12px);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Animations ── */
  @keyframes slideDown {
    from { opacity:0; transform: translateY(-14px); }
    to   { opacity:1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity:0; transform: translateY(14px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* Leaflet dark override */
  .leaflet-tile { filter: brightness(0.7) saturate(0.5) hue-rotate(180deg) invert(1) contrast(0.9); }
  .leaflet-container { background: #0f1419; }
</style>
</head>
<body class="mode-walk">

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo-block">
      <div class="logo">TrackMove</div>
      <div class="sub">GPS Activity Tracker</div>
    </div>
    <div class="gps-badge">
      <div class="gps-dot" id="gpsDot"></div>
      <span id="gpsLabel">NO GPS</span>
    </div>
  </div>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <div class="tab walk active" onclick="setMode('walk', this)">
      <span class="tab-icon">🚶</span>
      <span class="tab-name">Walk</span>
    </div>
    <div class="tab jog" onclick="setMode('jog', this)">
      <span class="tab-icon">🏃</span>
      <span class="tab-name">Jog</span>
    </div>
    <div class="tab bike" onclick="setMode('bike', this)">
      <span class="tab-icon">🚴</span>
      <span class="tab-name">Bike</span>
    </div>
  </div>

  <!-- Map -->
  <div class="map-wrapper">
    <div id="map"></div>
    <div class="map-overlay">Speed: <span id="mapSpeed">0.0 km/h</span></div>
  </div>

  <!-- KM Hero -->
  <div class="km-hero">
    <div class="km-label">Distansya</div>
    <div class="km-number" id="kmDisplay">0.00</div>
    <div class="km-unit">Kilometro</div>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-box-label">⏱ Oras</div>
      <div class="timer-box">
        <div class="live-dot" id="liveDot"></div>
        <div>
          <div class="stat-box-value" id="timerDisplay">00:00:00</div>
          <div class="stat-box-unit">h : m : s</div>
        </div>
      </div>
    </div>
    <div class="stat-box">
      <div class="stat-box-label">🔥 Calories</div>
      <div class="stat-box-value" id="calDisplay">0</div>
      <div class="stat-box-unit">kcal</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-msg" id="statusMsg">Pindutin ang <span class="hi">START</span> para magsimula</div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-start" id="startBtn" onclick="startTracking()">▶ SIMULA</button>
    <button class="btn btn-pause" id="pauseBtn" onclick="pauseTracking()" disabled>⏸ PAUSE</button>
    <button class="btn btn-stop"  id="stopBtn"  onclick="stopTracking()"  disabled>⏹ TAPOS</button>
  </div>

  <!-- Log -->
  <div class="log-panel">
    <div class="log-head">
      <div class="log-title">📋 Mga Nakaraang Session</div>
      <button class="btn-clear" onclick="clearLog()">I-Clear</button>
    </div>
    <div id="logList"><div class="log-empty">Wala pang naka-record.</div></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
function loadLeaflet(callback) {
  // Try cdnjs first (allowed), then jsDelivr, then unpkg
  const cdns = [
    'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js',
    'https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js',
    'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'
  ];
  let idx = 0;
  function tryNext() {
    if (idx >= cdns.length) { callback(new Error('All CDNs failed')); return; }
    const s = document.createElement('script');
    s.src = cdns[idx++];
    s.onload = () => callback(null);
    s.onerror = () => tryNext();
    document.head.appendChild(s);
  }
  tryNext();
}

document.addEventListener('DOMContentLoaded', function() {
  loadLeaflet(function(err) {
    if (err) {
      document.getElementById('map').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#5a6578;font-size:13px;text-align:center;padding:20px">⚠️ Hindi ma-load ang mapa.<br>Gagana pa rin ang GPS tracking.</div>';
      initApp();
      return;
    }
    initApp();
  });
});

function initApp() {

// ── State ──
let mode = 'walk';
let isRunning = false;
let isPaused = false;
let watchId = null;
let timerInterval = null;
let startTime = null;
let elapsedMs = 0;
let totalKm = 0;
let lastPos = null;
let currentSpeed = 0;
let gpsReady = false;
let sessions = JSON.parse(localStorage.getItem('tm_gps_sessions') || '[]');

const WEIGHT_KG = 70;
const MET = { walk: 3.5, jog: 7.0, bike: 8.0 };
const ICONS = { walk: '🚶', jog: '🏃', bike: '🚴' };

// ── Map Init ──
let map = null, routeLine = null, markerIcon = null, userMarker = null;

if (typeof L !== 'undefined') {
  map = L.map('map', { zoomControl: false, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  map.setView([14.1753, 121.1218], 15);
  routeLine = L.polyline([], { color: '#00d9a3', weight: 4, opacity: 0.85, lineJoin: 'round' }).addTo(map);
  markerIcon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:#00d9a3;border:3px solid #fff;box-shadow:0 0 12px rgba(0,217,163,0.8)"></div>`,
    iconSize: [14,14], iconAnchor: [7,7]
  });
}

function updateRouteColor() {
  const colors = { walk: '#00d9a3', jog: '#ff6b35', bike: '#3d9eff' };
  if (routeLine) routeLine.setStyle({ color: colors[mode] });
}

// ── Haversine ──
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// ── GPS ──
function startGPS() {
  if (!navigator.geolocation) { showToast('Hindi available ang GPS sa device mo.'); return; }

  watchId = navigator.geolocation.watchPosition(onPosition, onGPSError, {
    enableHighAccuracy: true,
    maximumAge: 2000,
    timeout: 10000
  });
}

function onPosition(pos) {
  const { latitude: lat, longitude: lon, speed } = pos.coords;

  gpsReady = true;
  document.getElementById('gpsDot').classList.add('locked');
  document.getElementById('gpsLabel').textContent = 'GPS OK';

  // Speed
  if (speed !== null && speed >= 0) {
    currentSpeed = speed * 3.6; // m/s to km/h
  }
  document.getElementById('mapSpeed').textContent = currentSpeed.toFixed(1) + ' km/h';

  // Update marker
  const latlng = [lat, lon];
  if (map && markerIcon) {
    if (!userMarker) {
      userMarker = L.marker(latlng, { icon: markerIcon }).addTo(map);
      map.setView(latlng, 17);
    } else {
      userMarker.setLatLng(latlng);
      if (isRunning) map.panTo(latlng, { animate: true, duration: 0.5 });
    }
  }

  // Track km if running
  if (isRunning && lastPos) {
    const dist = haversine(lastPos.lat, lastPos.lon, lat, lon);
    if (dist > 0.003 && dist < 0.3) {
      totalKm += dist;
      if (routeLine) routeLine.addLatLng(latlng);
    }
  }

  lastPos = { lat, lon };
  updateDisplay();
}

function onGPSError(err) {
  gpsReady = false;
  document.getElementById('gpsDot').classList.remove('locked');
  document.getElementById('gpsLabel').textContent = 'NO GPS';

  const msgs = {
    1: 'Hindi pinahintulutan ang GPS. I-allow sa settings.',
    2: 'Hindi ma-detect ang location. Lumabas ka muna.',
    3: 'Nag-timeout ang GPS. Subukan ulit.'
  };
  showToast(msgs[err.code] || 'GPS error.');
}

// ── Controls ──
function startTracking() {
  if (!gpsReady && !isPaused) {
    // Try to get GPS first
    startGPS();
    document.getElementById('statusMsg').innerHTML = 'Kumokonekta sa <span class="hi">GPS</span>...';
    // Wait 2s then start anyway if GPS connects
    setTimeout(() => {
      if (gpsReady) beginSession();
      else {
        showToast('Wala pang GPS signal. Siguraduhing naka-on ang location at nasa labas ka.');
      }
    }, 2500);
    return;
  }
  beginSession();
}

function beginSession() {
  if (isPaused) {
    // Resume
    startTime = Date.now() - elapsedMs;
    isPaused = false;
  } else {
    startTime = Date.now() - elapsedMs;
    if (routeLine) { routeLine.setLatLngs([]); if (lastPos) routeLine.addLatLng([lastPos.lat, lastPos.lon]); }
  }

  isRunning = true;
  timerInterval = setInterval(tickTimer, 1000);

  document.getElementById('startBtn').disabled = true;
  document.getElementById('pauseBtn').disabled = false;
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('liveDot').classList.add('on');
  document.getElementById('statusMsg').innerHTML = `Nag-<span class="hi">${mode}</span> na!`;

  // Block mode switch while running
  document.querySelectorAll('.tab').forEach(t => t.style.pointerEvents = 'none');
}

function pauseTracking() {
  if (!isRunning) return;
  clearInterval(timerInterval);
  elapsedMs = Date.now() - startTime;
  isRunning = false;
  isPaused = true;

  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = '▶ ITULOY';
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('liveDot').classList.remove('on');
  document.getElementById('statusMsg').innerHTML = 'Na-<span class="hi">pause</span>. Pindutin ITULOY para magpatuloy.';
}

function stopTracking() {
  clearInterval(timerInterval);
  if (!isPaused) elapsedMs = Date.now() - startTime;
  isRunning = false;
  isPaused = false;

  saveSession();
  resetState();
}

function resetState() {
  totalKm = 0; elapsedMs = 0; startTime = null; currentSpeed = 0;
  if (routeLine) routeLine.setLatLngs([]);
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = '▶ SIMULA';
  document.getElementById('pauseBtn').disabled = true;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('liveDot').classList.remove('on');
  document.getElementById('kmDisplay').textContent = '0.00';
  document.getElementById('timerDisplay').textContent = '00:00:00';
  document.getElementById('calDisplay').textContent = '0';
  document.getElementById('mapSpeed').textContent = '0.0 km/h';
  document.getElementById('statusMsg').innerHTML = 'Pindutin ang <span class="hi">START</span> para magsimula';
  document.querySelectorAll('.tab').forEach(t => t.style.pointerEvents = '');
}

function tickTimer() {
  elapsedMs = Date.now() - startTime;
  document.getElementById('timerDisplay').textContent = formatTime(elapsedMs);
  updateDisplay();
}

function updateDisplay() {
  document.getElementById('kmDisplay').textContent = totalKm.toFixed(2);
  const hrs = elapsedMs / 3600000;
  const cal = Math.round(MET[mode] * WEIGHT_KG * hrs);
  document.getElementById('calDisplay').textContent = cal;
}

// ── Mode ──
function setMode(m, el) {
  if (isRunning || isPaused) return;
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.body.className = 'mode-' + m;
  updateRouteColor();
}

// ── Format ──
function formatTime(ms) {
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return [h,m,sec].map(v => String(v).padStart(2,'0')).join(':');
}

// ── Log ──
function saveSession() {
  if (totalKm < 0.01 && elapsedMs < 5000) return;
  const s = {
    id: Date.now(), mode,
    km: totalKm.toFixed(2),
    duration: formatTime(elapsedMs),
    date: new Date().toLocaleString('tl-PH', { dateStyle:'short', timeStyle:'short' })
  };
  sessions.unshift(s);
  if (sessions.length > 25) sessions = sessions.slice(0,25);
  localStorage.setItem('tm_gps_sessions', JSON.stringify(sessions));
  renderLog();
}

function clearLog() {
  if (!confirm('I-clear lahat ng session?')) return;
  sessions = [];
  localStorage.removeItem('tm_gps_sessions');
  renderLog();
}

function renderLog() {
  const el = document.getElementById('logList');
  if (!sessions.length) { el.innerHTML = '<div class="log-empty">Wala pang naka-record.</div>'; return; }
  el.innerHTML = sessions.map(s => `
    <div class="log-row">
      <div class="log-ico">${ICONS[s.mode]||'🏃'}</div>
      <div class="log-info">
        <div class="log-km-val">${s.km} km <span style="font-size:11px;font-weight:400;color:var(--muted)">${s.mode}</span></div>
        <div class="log-meta">${s.date}</div>
      </div>
      <div class="log-dur">${s.duration}</div>
    </div>`).join('');
}

// ── Toast ──
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

// ── Init ──
renderLog();
startGPS();

// Expose to global scope for onclick handlers
window.setMode = setMode;
window.startTracking = startTracking;
window.pauseTracking = pauseTracking;
window.stopTracking = stopTracking;
window.clearLog = clearLog;

} // end initApp
</script>
</body>
</html>
